<h1>📚 Study Planner</h1>

<p id="quote"></p>

<div class="tracker">
  <p>Progress: <span id="progressText">0%</span></p>
  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>
</div>

<div class="pomodoro">
  <h2>⏱️ Pomodoro Timer</h2>
  <p id="timer">25:00</p>
  <button onclick="startTimer()">Start</button>
  <button onclick="resetTimer()">Reset</button>
</div>
